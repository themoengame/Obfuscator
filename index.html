<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obfuscator JS Sederhana</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #0b1120;
            font-family: monospace;
            margin: 0;
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            background: #1e293b;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -10px black;
        }
        h1 {
            color: #e2e8f0;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            border-left: 3px solid #3b82f6;
            padding-left: 1rem;
        }
        .grid {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .box {
            flex: 1;
            min-width: 250px;
            background: #0f172a;
            border-radius: 1rem;
            border: 1px solid #334155;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .box-header {
            background: #1e293b;
            padding: 0.6rem 1rem;
            font-weight: bold;
            color: #cbd5e1;
            border-bottom: 1px solid #334155;
        }
        textarea {
            background: #0a0f1c;
            border: none;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #f1f5f9;
            resize: vertical;
            width: 100%;
            min-height: 300px;
            outline: none;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 0.25rem;
        }
        button:hover {
            background: #2563eb;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0 1rem;
        }
        .copy-btn {
            background: #475569;
        }
        .copy-btn:hover {
            background: #334155;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #64748b;
            margin-top: 1.5rem;
        }
        .msg {
            font-size: 0.8rem;
            text-align: center;
            color: #22c55e;
            margin-top: 0.5rem;
        }
    </style>
    <!-- Library javascript-obfuscator dari CDN -->
    <script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator@2.19.0/dist/index.js"></script>
</head>
<body>
<div class="container">
    <h1>🔀 JS Obfuscator</h1>
    <div class="sub">ubah kode JavaScript rapi → sulit dibaca, tetap jalan</div>

    <div class="grid">
        <div class="box">
            <div class="box-header">📝 Kode Asli (input)</div>
            <textarea id="inputCode" placeholder="Contoh: function hello() { console.log('Halo'); }">function hitungLuas(p, l) {
    let hasil = p * l;
    console.log("Luas: " + hasil);
    return hasil;
}
hitungLuas(5, 3);</textarea>
        </div>
        <div class="box">
            <div class="box-header">🔒 Hasil Obfuscated</div>
            <textarea id="outputCode" readonly placeholder="Klik tombol Obfuscate..."></textarea>
        </div>
    </div>

    <div class="actions">
        <button id="obfuscateBtn">🌀 Obfuscate</button>
        <button id="copyBtn" class="copy-btn">📋 Salin Hasil</button>
        <button id="clearBtn" class="copy-btn">🧹 Bersihkan</button>
    </div>
    <div id="infoMsg" class="msg"></div>
    <footer>⚡ Menggunakan library javascript-obfuscator · teknik: rename variabel, encode string, angka jadi ekspresi</footer>
</div>

<script>
    (function() {
        // Ambil elemen
        const inputEl = document.getElementById('inputCode');
        const outputEl = document.getElementById('outputCode');
        const obfBtn = document.getElementById('obfuscateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const msgEl = document.getElementById('infoMsg');

        // Cek library tersedia
        let obfuscatorAvailable = typeof JavaScriptObfuscator !== 'undefined';

        if (!obfuscatorAvailable) {
            msgEl.innerHTML = '⚠️ Library gagal dimuat. Periksa koneksi internet.';
            msgEl.style.color = '#f97316';
        }

        // Fungsi obfuscation sederhana
        function obfuscateCode(code) {
            if (!code.trim()) {
                throw new Error('Kode kosong');
            }
            if (!obfuscatorAvailable) {
                throw new Error('Library tidak tersedia');
            }
            const options = {
                compact: true,
                controlFlowFlattening: false,
                deadCodeInjection: false,
                stringArray: true,
                stringArrayEncoding: ['base64'],
                stringArrayThreshold: 0.8,
                renameGlobals: false,
                identifierNamesGenerator: 'hexadecimal',
                transformObjectKeys: true,
                numbersToExpressions: true,
                simplify: true,
                shuffleStringArray: true,
                selfDefending: false
            };
            const result = JavaScriptObfuscator.obfuscate(code, options);
            return result.getObfuscatedCode();
        }

        // Event handler obfuscate
        async function handleObfuscate() {
            const original = inputEl.value;
            if (!original.trim()) {
                outputEl.value = '// Tidak ada kode untuk diobfuscate';
                msgEl.innerHTML = '❌ Masukkan kode JavaScript terlebih dahulu.';
                msgEl.style.color = '#f87171';
                setTimeout(() => { if (msgEl.innerHTML.includes('Masukkan')) msgEl.innerHTML = ''; }, 2000);
                return;
            }

            // Tampilkan loading
            const oldText = obfBtn.innerHTML;
            obfBtn.innerHTML = '⏳ Memproses...';
            obfBtn.disabled = true;
            msgEl.innerHTML = '⚙️ Sedang mengacak kode...';
            msgEl.style.color = '#facc15';

            try {
                // sedikit jeda agar UI merespons
                await new Promise(r => setTimeout(r, 20));
                const obfuscated = obfuscateCode(original);
                outputEl.value = obfuscated;
                msgEl.innerHTML = '✅ Obfuscation berhasil!';
                msgEl.style.color = '#4ade80';
                setTimeout(() => { if (msgEl.innerHTML.includes('berhasil')) msgEl.innerHTML = ''; }, 2000);
            } catch (err) {
                console.error(err);
                let errMsg = err.message || 'Error tidak diketahui';
                if (errMsg.includes('Unexpected')) errMsg = 'Kode JavaScript tidak valid, periksa sintaks.';
                outputEl.value = `// Gagal: ${errMsg}\n// Pastikan kode JS Anda benar.`;
                msgEl.innerHTML = `⚠️ ${errMsg}`;
                msgEl.style.color = '#f97316';
            } finally {
                obfBtn.innerHTML = oldText;
                obfBtn.disabled = false;
            }
        }

        // Salin hasil
        function copyResult() {
            const result = outputEl.value;
            if (!result || result.includes('Gagal') || result.trim() === '') {
                msgEl.innerHTML = '⚠️ Tidak ada hasil yang bisa disalin. Lakukan obfuscate dulu.';
                msgEl.style.color = '#facc15';
                setTimeout(() => { if (msgEl.innerHTML.includes('disalin')) msgEl.innerHTML = ''; }, 1500);
                return;
            }
            navigator.clipboard.writeText(result).then(() => {
                msgEl.innerHTML = '📋 Hasil disalin ke clipboard!';
                msgEl.style.color = '#38bdf8';
                setTimeout(() => { if (msgEl.innerHTML.includes('clipboard')) msgEl.innerHTML = ''; }, 1500);
            }).catch(() => {
                msgEl.innerHTML = '❌ Gagal menyalin secara otomatis. Salin manual.';
                msgEl.style.color = '#ef4444';
            });
        }

        // Bersihkan
        function clearAll() {
            inputEl.value = '';
            outputEl.value = '';
            msgEl.innerHTML = '✨ Semua bersih. Masukkan kode JS baru.';
            msgEl.style.color = '#64748b';
            setTimeout(() => { if (msgEl.innerHTML.includes('bersih')) msgEl.innerHTML = ''; }, 1500);
        }

        // Pasang event listener
        obfBtn.addEventListener('click', handleObfuscate);
        copyBtn.addEventListener('click', copyResult);
        clearBtn.addEventListener('click', clearAll);

        // Jika library siap, tampilkan contoh hasil di awal (opsional)
        if (obfuscatorAvailable && inputEl.value.trim()) {
            try {
                const demo = obfuscateCode(inputEl.value);
                outputEl.value = demo;
                msgEl.innerHTML = '🚀 Siap digunakan. Contoh awal telah diobfuscate.';
                setTimeout(() => { if (msgEl.innerHTML.includes('Siap')) msgEl.innerHTML = ''; }, 2000);
            } catch(e) {
                outputEl.value = '// Klik Obfuscate untuk memproses.';
            }
        } else if (!obfuscatorAvailable) {
            outputEl.value = '// Library gagal dimuat.\n// Periksa koneksi internet atau muat ulang halaman.';
        }
    })();
</script>
</body>
</html>
